services:
  facelab:
    container_name: facelab
    build: .
    restart: unless-stopped
    environment:
      # Set this to /facelab when the app is exposed behind a reverse-proxy subpath.
      GRADIO_ROOT_PATH: ${GRADIO_ROOT_PATH:-}
    ports:
      - "7860:7860"
    volumes:
      - ./AI:/app/AI
      - ./Human:/app/Human
      - ./stimuli_metadata.csv:/app/stimuli_metadata.csv
